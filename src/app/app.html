<nav class="navbar">
    <div class="logo">GameZone</div>
    <div class="nav-buttons">
        @if(authService.usuarioActual()){
            <button routerLink="/auth/games">Juegos</button>
            <button routerLink="/auth/resultados">Resultados</button>
            <button routerLink="/auth/encuesta">Encuesta</button>
            <button routerLink="/auth/perfil">Perfil</button>
            <button>{{authService.usuarioActual()?.email}}</button>
             <button routerLink="home" (click)="cerrarSesion()">Cerrar Sesion</button>
        }

        @else {
            <button routerLink="/auth/login">Login</button>
            <button routerLink="/auth/registro">Registro</button>
        }
    </div>
</nav>

<router-outlet/>
