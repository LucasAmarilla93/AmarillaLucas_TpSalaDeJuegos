<button class="chat-toggle" (click)="chatAbierto = !chatAbierto">
    Chat
</button>

@if(chatAbierto){
<div class="chat-container">
    <h2>Chat</h2>
    <div class="c-mensajes">
        @for(msj of mensajes(); track msj.id){
        <div class="mensaje">
            <small>{{ msj.creado_en }}</small>
            <p class="nombre">{{ msj.usuario }}</p>
            <p>{{ msj.contenido }}</p>
        </div>
        }
    </div>
    <div class="chat-input">
        <input type="text" name="contenido" id="contenido" [(ngModel)]="contenido"
            placeholder="Escribí un mensaje..." />
        <button (click)="enviar()">Enviar</button>
    </div>
</div>
}
